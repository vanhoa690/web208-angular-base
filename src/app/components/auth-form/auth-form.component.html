<form [formGroup]="authForm" (ngSubmit)="handleSubmit()">
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input
      type="email"
      class="form-control"
      id="exampleInputEmail1"
      aria-describedby="emailHelp"
      formControlName="email"
    />
    @if(email?.touched && email?.hasError('required')) {
    <small class="text-danger">Required</small>
    }
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input
      type="password"
      class="form-control"
      id="exampleInputPassword1"
      formControlName="password"
    />
    @if(password?.touched && password?.hasError('required')) {
    <small class="text-danger">Required</small>
    } @if(password?.touched && password?.hasError('minlength')) {
    <small class="text-danger">Min 6 ky tu</small>
    }
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
